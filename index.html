<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialPulse｜Instagram 趨勢分析儀表板</title>
  <meta name="description" content="SocialPulse：快速探索 Instagram 關鍵字熱度、貼文樣貌與趨勢走勢。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <div class="app-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">SocialPulse Analytics</p>
        <h1>Instagram 趨勢分析儀表板</h1>
        <p class="subtitle">更俐落的搜尋、清晰的視覺化，以及更專業的內容洞察。</p>
      </div>
      <button id="theme-toggle-btn" class="icon-btn" aria-label="切換明暗主題">
        <i class="fa-solid fa-sun"></i>
      </button>
    </header>

    <main>
      <section class="controls panel">
        <div class="search-group">
          <label for="search-input">關鍵字</label>
          <div class="input-wrap">
            <i class="fa-solid fa-hashtag"></i>
            <input id="search-input" type="text" placeholder="例如：美妝、旅遊、穿搭" />
          </div>
        </div>

        <div class="search-group">
          <label for="date-range">日期範圍</label>
          <div class="input-wrap">
            <i class="fa-regular fa-calendar"></i>
            <input id="date-range" type="text" placeholder="選擇分析期間" />
          </div>
        </div>

        <button id="search-button" class="primary-btn">
          <i class="fa-solid fa-magnifying-glass"></i>
          開始分析
        </button>
      </section>

      <section id="empty-state" class="empty-state panel">
        <i class="fa-solid fa-chart-line"></i>
        <h2>輸入關鍵字以啟動分析</h2>
        <p>系統將自動產生貼文樣本、互動指標、熱門標籤及趨勢曲線。</p>
      </section>

      <section class="results-section" aria-live="polite">
        <div class="kpi-grid">
          <article class="kpi panel">
            <p>貼文數量</p>
            <strong id="kpi-posts">0</strong>
          </article>
          <article class="kpi panel">
            <p>平均按讚</p>
            <strong id="kpi-likes">0</strong>
          </article>
          <article class="kpi panel">
            <p>平均留言</p>
            <strong id="kpi-comments">0</strong>
          </article>
          <article class="kpi panel">
            <p>互動率（估算）</p>
            <strong id="kpi-engagement">0%</strong>
          </article>
        </div>

        <div class="content-grid">
          <section class="panel posts-panel">
            <div class="panel-head">
              <h2>相關貼文</h2>
              <div class="view-toggle">
                <button id="grid-view" class="view-btn active"><i class="fa-solid fa-grip"></i> 網格</button>
                <button id="list-view" class="view-btn"><i class="fa-solid fa-list"></i> 列表</button>
              </div>
            </div>
            <div id="posts-list" class="grid-view"></div>
          </section>

          <aside class="panel insights-panel">
            <h2>趨勢走勢</h2>
            <canvas id="trend-chart"></canvas>
            <div class="keywords-block">
              <h3>熱門關鍵字</h3>
              <div id="keywords-list" class="keywords-list"></div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 SocialPulse · Demo Dashboard</p>
    </footer>

    <button id="back-to-top" aria-label="回到頂部">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
  </div>
</body>
</html>
